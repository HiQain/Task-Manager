services:
  - type: web
    name: simple-task-master
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      # NOTE: This app uses MySQL (see `server/db.ts` and `shared/schema.ts`).
      # Set `DATABASE_URL` in the Render dashboard to a MySQL connection string:
      # mysql://user:password@host:3306/database
